function upgradeInsecureMedia(root){
  const scope = root || document;
  scope.querySelectorAll('img[src^="http://"], video[src^="http://"], source[src^="http://"]').forEach((el)=>{

  });

function next(){
  if(step >= steps.length - 1) return;
  app.style.opacity = 0;
  setTimeout(() => {
    step++;
    render();
    requestAnimationFrame(() => { app.style.opacity = 1; });
  }, 250);
}

function getProgress(){
  return Math.round((step / (steps.length - 1)) * 100);
}

function render(){
  cleanupIntervals();
  const s = steps[step];
  if(!s) return;

  // Kick off preloading for the next step's images so they're cached
  // by the time the user advances. Cheap fire-and-forget.
  const nextStep = steps[step + 1];
  if (nextStep) preloadFor(nextStep.type);

  if(s.type==="intro1") return renderIntro1();
  if(s.type==="intro2") return renderIntro2();
  if(s.type==="single") return renderSingle(s);
  if(s.type==="multi") return renderMulti(s);
  if(s.type==="interrupt1") return renderInterrupt1();
  if(s.type==="interrupt2") return renderInterrupt2();
  if(s.type==="progressive") return renderProgressive();
  if(s.type==="email") return renderEmail();
  if(s.type==="checkout") return renderCheckout();
}

          </div>
        </div>
      </div>
    </div>
  `;

  const input = document.getElementById("emailInput");
  const cta = document.getElementById("emailCta");
  const root = document.getElementById("emailRoot");

  setTimeout(()=>{ const t = document.querySelector(".email-title"); if(t) cta.style.maxWidth = t.offsetWidth + "px"; }, 10);

  function isValidEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

  input.addEventListener("input", ()=>{
    cta.classList.toggle("active", isValidEmail(input.value.trim()));
  });

  // Mobile-only UX: when keyboard is open (input focused), hide awards image
  // and let the inline CTA sit directly under the input — no scrolling needed.
  // We DO NOT remove this class on blur, because tapping the CTA itself fires
  // a blur first; if we removed the class then, the layout would shift before
  // the tap registered as a click and the user would have to tap twice.
  // The class persists for the lifetime of this step (next() rerenders).
  input.addEventListener("focus", ()=>{ root.classList.add("email-focused"); });

  // Belt-and-braces: prevent the input from losing focus when the user
  // interacts with the CTA, so the page never reshuffles mid-tap.
  cta.addEventListener("mousedown", (e)=>{ e.preventDefault(); });
  cta.addEventListener("touchstart", (e)=>{ /* allow native tap, just don't blur */ }, { passive: true });

  cta.onclick = ()=>{
    const val = input.value.trim();
    if(!isValidEmail(val)){
      const alertEl = document.getElementById("emailAlert");
      if(alertEl){ alertEl.style.opacity = 1; setTimeout(()=>alertEl.style.opacity=0, 3000); }
      return;
    }
    state.email = val;

    sendEmailCapture();
    next();
  };
}

function initCheckoutLogic(){
  let selected = "8";
  let buyClicked = false;

  document.querySelectorAll(".ss-plan").forEach(el=>{
    if(el.classList.contains("active")) selected = el.dataset.plan || "8";
    el.onclick = ()=>{
      selected = el.dataset.plan;
      document.querySelectorAll(".ss-plan").forEach(x=>x.classList.remove("active"));
      document.querySelectorAll(`.ss-plan[data-plan="${selected}"]`).forEach(x=>x.classList.add("active"));
    };
  });

  document.querySelectorAll(".js-buy-btn").forEach(btn=>{
    btn.onclick = ()=>{
      if(buyClicked) return;
      buyClicked = true;

      state.plan = selected;

      sendPlanSelection();
      renderPayment();
    };
  });

  const scrollHandler = ()=>{
    const target = document.getElementById("pricing");
    if(target) target.scrollIntoView({behavior:"smooth"});
  };

  const ctaTop = document.getElementById("ctaTop");
  if (ctaTop) ctaTop.onclick = scrollHandler;
  document.querySelectorAll(".js-scroll-pricing").forEach(btn=>{ btn.onclick = scrollHandler; });

  let seconds = 720;
  function tick(){
    const m = Math.floor(seconds/60);
    const s = seconds%60;
    const val = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
    const timerEl = document.getElementById("timer");
    if(timerEl) timerEl.innerText = val;
    document.querySelectorAll(".js-countdown").forEach(el=>{ el.innerText = val; });
    if(seconds > 0){ seconds--; } else { seconds = 720; }
  }
  checkoutTimerInterval = setInterval(tick, 1000);
  tick();

  const books = document.querySelectorAll(".ss-books-stage .ss-book");
  let order = Array.from(books);

  function renderBooks(){
    order.forEach(el=>{ el.classList.remove("ss-pos-left","ss-pos-center","ss-pos-right","ss-pos-hidden"); });
    if(order[0]) order[0].classList.add("ss-pos-left");
    if(order[1]) order[1].classList.add("ss-pos-center");
    if(order[2]) order[2].classList.add("ss-pos-right");
    for(let i=3;i<order.length;i++) order[i].classList.add("ss-pos-hidden");
  }

  function stepBooks(){
    if(!order.length) return;
    order.push(order.shift());
    renderBooks();
  }

  renderBooks();
  checkoutBooksInterval = setInterval(stepBooks, 2000);
}

      <div style="width:56px;height:56px;border:4px solid rgba(255,255,255,0.25);border-top-color:#ffd76a;border-radius:50%;margin-bottom:20px;animation:ss-spin 1s linear infinite;"></div>
      <div style="font-size:22px;font-weight:bold;margin-bottom:10px;">Processing your order...</div>
      <div style="opacity:.7;font-size:15px;">Please wait a moment</div>
    </div>
  `;
  setTimeout(function(){ renderSuccess(); }, 2200);
}

function renderSuccess(){
  const planData = {
    "1": { label:"1-week access", price:"$29.99" },
    "4": { label:"4-week access", price:"$19.99" },
    "8": { label:"8-week access", price:"$29.99" }
  };
  const plan = planData[state.plan] || planData["8"];

  state.payment_successful = "yes";

  sendPaymentSuccess();

  if(typeof fbq === "function"){
    fbq("track", "Purchase", {
      value: state.plan === "4" ? 19.99 : state.plan === "1" ? 29.99 : 29.99,
      currency: "USD"
    });
  }

  app.innerHTML = `
    <div class="ss-container" style="display:flex;flex-direction:column;align-items:center;padding-top:60px;text-align:center;">

      <div style="font-size:24px;font-weight:bold;margin-bottom:28px;">My Hidden Story</div>

      <div style="width:80px;height:80px;border-radius:50%;background:#1a6e38;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:24px;">&#10003;</div>

      <div style="font-size:28px;font-weight:bold;margin-bottom:12px;">You're in!</div>

      <div style="font-size:17px;opacity:.85;margin-bottom:24px;line-height:1.6;">
        We will soon send You the first Chapter of a custom and interactive story to your email:<br><br>
        <span style="color:#ffd76a;font-weight:bold;">${state.email || "your email"}</span>
      </div>

      <video src="/media/success_video.mp4" autoplay muted loop playsinline style="width:100%;border-radius:16px;margin-bottom:24px;display:block;"></video>

      <div style="background:rgba(255,255,255,0.07);border-radius:18px;padding:20px;width:100%;margin-bottom:30px;">
        <div style="font-size:15px;opacity:.7;margin-bottom:14px;">Your plan summary</div>
        <div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:8px;">
          <span>Plan</span><span>${plan.label}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:8px;">
          <span>Billed</span><span>${plan.price}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:15px;">
          <span>Access</span><span style="color:#8eff6d;">Active now</span>
        </div>
      </div>

    </div>
  `;

  localStorage.removeItem("ss_session");
}

const mediaObserver = new MutationObserver((mutations)=>{
  mutations.forEach((m)=>{
    m.addedNodes.forEach((node)=>{
      if(node && node.nodeType === 1){
        upgradeInsecureMedia(node);
      }
    });
  });
});
mediaObserver.observe(app, { childList: true, subtree: true });

render();
upgradeInsecureMedia(document);
sendPageLoadEventOnce();

});
</script></body>
</html>
