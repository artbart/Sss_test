<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vilnius Time</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #eaeaea;
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #a0a8d0;
      margin-bottom: 12px;
    }

    #clock {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #ffffff;
    }

    #date {
      margin-top: 12px;
      font-size: 1.1rem;
      color: #a0a8d0;
    }
  </style>
</head>
<body>
  <h1>Vilnius, Lithuania</h1>
  <div id="clock">--:--:--</div>
  <div id="date"></div>

  <script>
    function updateTime() {
      const now = new Date();
      const options = { timeZone: 'Europe/Vilnius' };

      const time = now.toLocaleTimeString('en-GB', { ...options, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { ...options, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById('clock').textContent = time;
      document.getElementById('date').textContent = date;
    }

    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
